<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create New Event</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="error" class="error-msg">{{ error }}</div>
      
      <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="w-100 mb-3">
          <mat-label>Event Title</mat-label>
          <input matInput formControlName="title">
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-100 mb-3">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="4"></textarea>
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="fill" class="w-50 mb-3 pr-2">
            <mat-label>Category</mat-label>
            <mat-select formControlName="category">
              <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
            </mat-select>
          </mat-form-field>
          <mat-form-field appearance="fill" class="w-50 mb-3 pl-2">
            <mat-label>Date & Time</mat-label>
            <input matInput type="datetime-local" formControlName="date">
          </mat-form-field>
        </div>

        <div formGroupName="location" class="location-group">
          <h4>Location Details</h4>
          <mat-form-field appearance="fill" class="w-100 mb-3">
            <mat-label>Address</mat-label>
            <input matInput formControlName="address">
          </mat-form-field>
          <mat-form-field appearance="fill" class="w-100 mb-3">
            <mat-label>City</mat-label>
            <input matInput formControlName="city">
          </mat-form-field>
        </div>

        <div class="row">
          <mat-form-field appearance="fill" class="w-50 mb-3 pr-2">
            <mat-label>Max Attendees</mat-label>
            <input matInput type="number" formControlName="maxAttendees">
          </mat-form-field>
          <mat-form-field appearance="fill" class="w-50 mb-3 pl-2">
            <mat-label>Banner Image URL</mat-label>
            <input matInput formControlName="bannerImage">
          </mat-form-field>
        </div>

        <div class="actions">
          <button mat-button type="button" routerLink="/dashboard">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="eventForm.invalid">Create Event</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
